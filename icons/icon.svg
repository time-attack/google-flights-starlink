<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    
    <!-- Starlink-style Cyan/Green Signal Gradient -->
    <linearGradient id="signalGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    
    <!-- Airplane Subtle Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Circular Outer Shell -->
  <rect width="128" height="128" rx="28" fill="url(#bgGrad)" />
  <circle cx="64" cy="64" r="54" fill="none" stroke="#334155" stroke-width="2" stroke-dasharray="4 6" opacity="0.6" />

  <!-- Satellite Signal Waves (Starlink styling) -->
  <!-- Inner Wave -->
  <path d="M 44 48 A 28 28 0 0 1 84 48" fill="none" stroke="url(#signalGrad)" stroke-width="4" stroke-linecap="round" opacity="0.4" />
  <!-- Middle Wave -->
  <path d="M 34 38 A 42 42 0 0 1 94 38" fill="none" stroke="url(#signalGrad)" stroke-width="5" stroke-linecap="round" opacity="0.7" />
  <!-- Outer Wave -->
  <path d="M 24 28 A 56 56 0 0 1 104 28" fill="none" stroke="url(#signalGrad)" stroke-width="6" stroke-linecap="round" />

  <!-- Center Signal Dot -->
  <circle cx="64" cy="56" r="5" fill="#10b981" />

  <!-- Airplane Silhouette -->
  <!-- Centered and angled slightly up-right (45 degrees) -->
  <g transform="translate(64, 76) rotate(-45)" filter="url(#shadow)">
    <!-- Fuselage -->
    <path d="M 0 -28 
             C 1.5 -28, 3.5 -24, 3.5 -18 
             L 3.5 16 
             C 3.5 20, 1.5 22, 0 22 
             C -1.5 22, -3.5 20, -3.5 16 
             L -3.5 -18 
             C -3.5 -24, -1.5 -28, 0 -28 Z" 
          fill="#f8fafc" />
          
    <!-- Main Wings -->
    <path d="M 0 -6 
             L 26 8 
             C 27 8.5, 27 10, 25.5 10 
             L 3.5 4 
             L -3.5 4 
             L -25.5 10 
             C -27 10, -27 8.5, -26 8 
             Z" 
          fill="#f8fafc" />
          
    <!-- Tail Wing (Horizontal Stabilizer) -->
    <path d="M 0 14 
             L 10 19 
             C 10.5 19.3, 10.5 19.8, 9.5 19.8 
             L 1.5 17.5 
             L -1.5 17.5 
             L -9.5 19.8 
             C -10.5 19.8, -10.5 19.3, -10 19 
             Z" 
          fill="#cbd5e1" />
          
    <!-- Vertical Fin (Tail) -->
    <path d="M 0 10 L 0 20 L 0 20 Z" stroke="#94a3b8" stroke-width="1.5" stroke-linecap="round" />
  </g>

  <!-- WiFi Symbol Dot (At the tail of the plane) -->
  <circle cx="64" cy="100" r="3" fill="#38bdf8" />
</svg>
